name: Build Desktop App

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd desktop-app
          npm install

      - name: Build and package (macOS)
        run: |
          cd desktop-app
          npm run package:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: analytics-debugger-mac
          path: desktop-app/release/*.dmg
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd desktop-app
          npm install

      - name: Build and package (Windows)
        run: |
          cd desktop-app
          npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: analytics-debugger-windows
          path: desktop-app/release/*.exe
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: analytics-debugger-mac
          path: ./artifacts/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: analytics-debugger-windows
          path: ./artifacts/win

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Analytics Debugger ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/mac/*.dmg
            ./artifacts/win/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
